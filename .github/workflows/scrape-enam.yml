name: eNAM Daily Scraper

on:
  schedule:
    - cron: '0 0 * * *'  # Run every day at midnight UTC
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Number of days to backfill (e.g. 30)'
        required: false
        default: '0'

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install playwright psycopg2-binary
        playwright install chromium

    - name: Run Scraper (Daily)
      if: ${{ github.event.inputs.backfill == '0' || github.event.inputs.backfill == '' }}
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        python scrapers/run_enam_to_db.py

    - name: Run Scraper (Historical Backfill)
      if: ${{ github.event.inputs.backfill != '0' && github.event.inputs.backfill != '' }}
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        python scrapers/run_enam_to_db.py --backfill-days ${{ github.event.inputs.backfill }}
