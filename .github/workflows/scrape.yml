name: Scrape Agricultural Price Data

on:
  schedule:
    # Run every 2 hours (UTC) — covers Indian market hours + after-hours updates
    - cron: '0 */2 * * *'
  workflow_dispatch:
    # Allow manual trigger for testing and first-run
    inputs:
      dry_run:
        description: 'Dry run (no commit)'
        required: false
        default: 'false'

jobs:
  scrape:
    name: Run all scrapers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write  # Required for git-auto-commit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scrapers/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run all scrapers
        run: python scrapers/run_all.py
        env:
          DATAGOVIN_API_KEY: ${{ secrets.DATAGOVIN_API_KEY }}
          IDP_API_KEY: ${{ secrets.IDP_API_KEY }}

      - name: Show data summary
        run: |
          echo "=== Scrape log (last 5 entries) ==="
          tail -n 5 data/scrape_log.csv || echo "No scrape log found"
          echo ""
          echo "=== Latest data file sizes ==="
          ls -lh data/latest/ 2>/dev/null || echo "No latest data yet"
          echo ""
          echo "=== History files today ==="
          find data/history -name "$(date +%Y-%m-%d).csv" 2>/dev/null || echo "No history files today"

      - name: Commit updated data files
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            data: scrape run ${{ github.run_id }} (${{ github.run_number }})

            Automated price data update — $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          file_pattern: "data/**"
          commit_user_name: "Grainology Bot"
          commit_user_email: "bot@grainology.vercel.app"
          skip_dirty_check: false
