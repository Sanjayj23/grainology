name: Scrape Agricultural Price Data

on:
  schedule:
    # 3 runs per day at IST off-peak times:
    # 02:30 UTC = 08:00 IST (pre-market, server usually quiet)
    # 08:30 UTC = 14:00 IST (post-morning-rush)
    # 17:30 UTC = 23:00 IST (night, lowest traffic)
    - cron: '30 2 * * *'
    - cron: '30 8 * * *'
    - cron: '30 17 * * *'
  workflow_dispatch:
    # Allow manual trigger for testing and first-run
    inputs:
      dry_run:
        description: 'Dry run (no commit)'
        required: false
        default: 'false'

jobs:
  scrape:
    name: Run all scrapers
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write  # Required for git-auto-commit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scrapers/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Install Playwright Browsers
        run: playwright install chromium

      - name: Run all scrapers
        run: python scrapers/run_all.py
        env:
          DATAGOVIN_API_KEY: ${{ secrets.DATAGOVIN_API_KEY }}
        # No continue-on-error here on purpose: if the CRITICAL source
        # (data.gov.in) failed, run_all.py exits 1 and we want the job to
        # show red so you actually notice. Downstream steps still run
        # because they're each marked if: always() below.

      - name: Show data summary
        run: |
          echo "=== Scrape log (last 5 entries) ==="
          tail -n 5 data/scrape_log.csv || echo "No scrape log found"
          echo ""
          echo "=== Latest data file sizes ==="
          ls -lh data/latest/ 2>/dev/null || echo "No latest data yet"
          echo ""
          echo "=== History files today ==="
          find data/history -name "$(date +%Y-%m-%d).csv" 2>/dev/null || echo "No history files today"
        # Always run this even if run_all.py exits 1 (critical source failed),
        # so you still get a visible summary instead of just a red X.
        if: always()

      - name: Upload diagnostic artifacts
        # Only the self-healing scrapers (Agmarknet, eNAM) write here, and
        # only when they couldn't find what they expected. If this step is
        # skipped, nothing needed debugging this run. If it ran, grab the
        # .png/.html from the Actions tab and share it back to get an exact
        # selector fix instead of another guess.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-diagnostics-${{ github.run_id }}
          path: data/debug/
          retention-days: 7
          if-no-files-found: ignore

      - name: Commit updated data files
        if: always() && github.event.inputs.dry_run != 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            data: scrape run ${{ github.run_id }} (${{ github.run_number }})

            Automated price data update — $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          file_pattern: "data/**"
          commit_user_name: "Grainology Bot"
          commit_user_email: "bot@grainology.vercel.app"
          skip_dirty_check: false
